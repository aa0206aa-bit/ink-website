<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>序序 XuXu｜流動墨</title>
<meta name="description" content="序序・藝術流動墨。在這裡親手感受滴墨、吹墨、傾斜流動的墨水技法，找到屬於你的那一色。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ===== 設計 tokens（spec §5.1 和紙晝色）===== */
:root {
  --bg: #efeae0;
  --panel: #f7f3ea;
  --text: #2a2723;
  --text-dim: rgba(42, 39, 35, .62);
  --text-faint: rgba(42, 39, 35, .4);
  --gold: #8a6d1f;
  --gold-dim: rgba(138, 109, 31, .55);
  --serif: "Noto Serif TC", "Songti TC", Georgia, serif;
  --sans: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
  --maxw: 1080px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}
a { color: inherit; text-decoration: none; }
section { max-width: var(--maxw); margin: 0 auto; padding: 96px 24px; }
.section-title {
  font-family: var(--serif);
  font-size: 28px;
  letter-spacing: 8px;
  color: var(--text);
  margin-bottom: 12px;
}
.section-sub { color: var(--text-dim); font-size: 14px; margin-bottom: 48px; letter-spacing: 1px; }

/* ===== 導覽列 ===== */
.nav {
  position: sticky; top: 0; z-index: 100;
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 32px;
  background: rgba(239, 234, 224, .8);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(42, 39, 35, .08);
}
.nav-brand { font-family: var(--serif); font-size: 18px; letter-spacing: 8px; }
.nav-links { display: flex; gap: 28px; font-size: 13px; letter-spacing: 3px; color: var(--text-dim); }
.nav-links a:hover { color: var(--gold); }

/* ===== Hero ===== */
.hero {
  position: relative; overflow: hidden;
  min-height: 78vh;
  display: flex; align-items: center; justify-content: center;
  text-align: center;
}
.hero-blobs { position: absolute; inset: 0; }
.blob { position: absolute; border-radius: 50%; filter: blur(10px); }
.blob-1 {
  width: 420px; height: 420px; top: -80px; left: 8%;
  background: radial-gradient(circle at 40% 40%, rgba(15, 107, 99, .3), rgba(15, 107, 99, .06) 50%, transparent 72%);
  animation: drift-1 52s ease-in-out infinite alternate;
}
.blob-2 {
  width: 360px; height: 360px; bottom: -60px; right: 10%;
  background: radial-gradient(circle at 55% 50%, rgba(143, 32, 80, .26), rgba(143, 32, 80, .05) 52%, transparent 74%);
  animation: drift-2 64s ease-in-out infinite alternate;
}
.blob-3 {
  width: 200px; height: 200px; bottom: 16%; right: 26%;
  background: radial-gradient(circle, rgba(154, 123, 30, .24), transparent 66%);
  animation: drift-3 47s ease-in-out infinite alternate;
}
@keyframes drift-1 { to { transform: translate(60px, 40px) scale(1.12); } }
@keyframes drift-2 { to { transform: translate(-50px, -30px) scale(1.08); } }
@keyframes drift-3 { to { transform: translate(-40px, 20px) scale(1.18); } }
@media (prefers-reduced-motion: reduce) {
  .blob { animation: none; }
  html { scroll-behavior: auto; }
}
.hero-inner { position: relative; padding: 24px; }
.hero-brand {
  font-family: var(--serif); font-weight: 600;
  font-size: clamp(56px, 10vw, 96px);
  letter-spacing: .45em; text-indent: .45em; /* 寬字距置中補償 */
}
.hero-tagline { color: var(--text-dim); font-size: 15px; letter-spacing: 6px; margin-top: 18px; }
.hero-cta {
  display: inline-block; margin-top: 44px;
  padding: 12px 32px;
  border: 1px solid var(--gold-dim); color: var(--gold);
  font-size: 13px; letter-spacing: 3px;
  transition: background .3s;
}
.hero-cta:hover { background: rgba(138, 109, 31, .1); }

/* ===== 體驗區 ===== */
.studio {
  background: var(--panel);
  border: 1px solid rgba(42, 39, 35, .08);
  border-radius: 6px;
  padding: 20px;
}
.toolbar { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
.modes { display: flex; gap: 8px; }
.mode-btn, .clear-btn {
  font-family: var(--sans); font-size: 13px; letter-spacing: 2px;
  padding: 8px 18px; cursor: pointer;
  background: transparent; color: var(--text-dim);
  border: 1px solid rgba(42, 39, 35, .25); border-radius: 3px;
  transition: color .25s, border-color .25s, background .25s;
}
.mode-btn:hover, .clear-btn:hover { color: var(--text); border-color: rgba(42, 39, 35, .5); }
.mode-btn.active { color: var(--gold); border-color: var(--gold-dim); background: rgba(138, 109, 31, .08); }
.mode-hint { font-size: 12px; color: var(--text-faint); letter-spacing: 1px; flex: 1; min-width: 200px; }
.canvas-wrap { position: relative; }
#inkCanvas {
  width: 100%; height: 460px; display: block;
  border-radius: 4px; background: #efeae0;
  touch-action: none; cursor: crosshair;
}
.fallback {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; color: var(--text-dim); font-size: 14px; line-height: 2;
}
.fallback-blob {
  width: 180px; height: 180px; border-radius: 50%;
  background:
    radial-gradient(circle at 40% 40%, rgba(15, 107, 99, .38), transparent 70%),
    radial-gradient(circle at 65% 60%, rgba(143, 32, 80, .32), transparent 70%);
  filter: blur(4px);
  margin-bottom: 20px;
}
.palette-row { display: flex; align-items: center; gap: 16px; margin-top: 16px; flex-wrap: wrap; }
.palette { display: flex; gap: 12px; }
.swatch {
  width: 34px; height: 34px; border-radius: 50%;
  border: 2px solid transparent; cursor: pointer; padding: 0;
  transition: transform .2s, border-color .2s, box-shadow .2s;
}
.swatch:hover { transform: scale(1.12); }
.swatch.active { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(138, 109, 31, .2); }
.palette-label { font-size: 12px; color: var(--text-faint); }
.palette-label a { color: var(--text-dim); border-bottom: 1px dotted var(--text-faint); }
.palette-label a:hover { color: var(--gold); }
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-brand" href="#top">序序</a>
  <div class="nav-links">
    <a href="#experience">體驗</a>
    <a href="#inks">墨色</a>
    <a href="#gallery">作品</a>
    <a href="#about">關於</a>
  </div>
</nav>

<header id="top" class="hero">
  <div class="hero-blobs" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>
  <div class="hero-inner">
    <h1 class="hero-brand">序序</h1>
    <p class="hero-tagline">讓墨自己說話</p><!-- 佔位標語，日後可換 -->
    <a class="hero-cta" href="#experience">親手玩一次墨 ↓</a>
  </div>
</header>

<section id="experience">
  <h2 class="section-title">體驗</h2>
  <p class="section-sub">選一種技法、選一色墨，在這裡親手感受流動墨的脾氣。</p>
  <div class="studio">
    <div class="toolbar">
      <div class="modes" role="group" aria-label="技法選擇">
        <button class="mode-btn active" data-mode="drop" aria-pressed="true">滴墨</button>
        <button class="mode-btn" data-mode="blow" aria-pressed="false">吹墨</button>
        <button class="mode-btn" data-mode="tilt" aria-pressed="false">傾斜</button>
      </div>
      <p class="mode-hint" id="modeHint">輕點畫布，看墨滴落、暈開</p>
      <button class="clear-btn" id="clearBtn">清 ↺</button>
    </div>
    <div class="canvas-wrap">
      <canvas id="inkCanvas"></canvas>
      <div class="fallback" id="webglFallback" hidden>
        <div class="fallback-blob"></div>
        <p>你的瀏覽器不支援互動墨水體驗。<br>往下看看墨色與作品吧。</p>
      </div>
    </div>
    <div class="palette-row">
      <div class="palette" id="palette" role="group" aria-label="墨色選擇"></div>
      <p class="palette-label" id="paletteLabel"></p>
    </div>
  </div>
</section>

<section id="inks"><!-- Task 6: 墨色產品區 --></section>

<section id="gallery"><!-- Task 7: 作品展示 --></section>

<section id="about"><!-- Task 8: 關於序序 --></section>

<footer><!-- Task 8: Footer --></footer>

<script type="module">
import { InkSimulation } from './fluid.js';

// ===== 產品資料：單一事實來源（色盤＋產品卡都由此渲染；改連結/色號只改這裡）=====
const INKS = [
  { no: '01', name: '初潮', hex: '#0f6b63', buyUrl: '#' },
  { no: '02', name: '夜枝', hex: '#8f2050', buyUrl: '#' },
  { no: '03', name: '鎏金', hex: '#9a7b1e', buyUrl: '#' },
  { no: '04', name: '靜淵', hex: '#24418f', buyUrl: '#' },
];

const MODE_HINTS = {
  drop: '輕點畫布，看墨滴落、暈開',
  blow: '先滴幾滴墨，按住拖曳，氣流會推出觸鬚紋路',
  tilt: '按住往一個方向拖，整片墨會隨傾斜流動',
};

// ---- 互動體驗區 ----
const canvas = document.getElementById('inkCanvas');
const fallbackEl = document.getElementById('webglFallback');
let sim = null;
try {
  sim = new InkSimulation(canvas);
} catch (err) {
  canvas.hidden = true;
  fallbackEl.hidden = false;
  console.warn('[ink] WebGL 不可用，顯示靜態替代', err);
}
window.__inkSim = sim; // 調試用

if (sim) {
  const modeBtns = document.querySelectorAll('.mode-btn');
  const hintEl = document.getElementById('modeHint');
  modeBtns.forEach((btn) => btn.addEventListener('click', () => {
    modeBtns.forEach((b) => {
      b.classList.toggle('active', b === btn);
      b.setAttribute('aria-pressed', String(b === btn));
    });
    sim.setMode(btn.dataset.mode);
    hintEl.textContent = MODE_HINTS[btn.dataset.mode];
  }));

  const palette = document.getElementById('palette');
  const paletteLabel = document.getElementById('paletteLabel');
  const setLabel = (ink) => {
    paletteLabel.innerHTML = `當前墨色：<a href="#inks">${ink.name} №${ink.no} ↓</a>`;
  };
  INKS.forEach((ink, idx) => {
    const b = document.createElement('button');
    b.className = 'swatch' + (idx === 0 ? ' active' : '');
    b.style.background = `radial-gradient(circle at 35% 35%, ${ink.hex}, ${ink.hex}cc)`;
    b.title = `${ink.name} №${ink.no}`;
    b.setAttribute('aria-label', `選擇墨色 ${ink.name}`);
    b.addEventListener('click', () => {
      palette.querySelectorAll('.swatch').forEach((s) => s.classList.remove('active'));
      b.classList.add('active');
      sim.setColor(ink.hex);
      setLabel(ink);
    });
    palette.appendChild(b);
  });
  sim.setColor(INKS[0].hex);
  setLabel(INKS[0]);

  // 清除：引擎內洗い流す漸淡（~1.5s 墨被水洗走，spec §4.2）
  const clearBtn = document.getElementById('clearBtn');
  clearBtn.addEventListener('click', () => sim.clear());

  // 載入初始滴墨：首屏即有畫面（spec §4.4）
  [
    { t: 0,   u: 0.38, v: 0.58, ink: 0 },
    { t: 450, u: 0.62, v: 0.42, ink: 3 },
    { t: 950, u: 0.50, v: 0.62, ink: 1 },
  ].forEach((k) => setTimeout(() => sim.splatAt(k.u, k.v, INKS[k.ink].hex), k.t));

  // 閒置自動演出（spec §4.4）：閒置 6s 起自動滴墨＋偶爾補滴與輕水流，互動即重新計時
  const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
  const IDLE_MS = 6000;
  const PERFORM_GAP = reduced ? 7000 : 3500;
  let lastActive = performance.now();
  const markActive = () => { lastActive = performance.now(); };
  canvas.addEventListener('pointerdown', markActive);
  canvas.addEventListener('pointermove', markActive);
  setInterval(() => {
    if (sim.paused || performance.now() - lastActive < IDLE_MS) return;
    const u = 0.15 + Math.random() * 0.7;
    const v = 0.2 + Math.random() * 0.6;
    const idx = Math.floor(Math.random() * INKS.length);
    sim.splatAt(u, v, INKS[idx].hex);
    if (Math.random() < 0.3) {
      const other = INKS[(idx + 1 + Math.floor(Math.random() * (INKS.length - 1))) % INKS.length];
      setTimeout(() => sim.splatAt(
        Math.min(0.95, Math.max(0.05, u + (Math.random() - 0.5) * 0.12)),
        Math.min(0.95, Math.max(0.05, v + (Math.random() - 0.5) * 0.12)),
        other.hex,
      ), 500);
    }
    if (!reduced && Math.random() < 0.5) {
      sim.stir(Math.random(), Math.random(), (Math.random() - 0.5) * 900, (Math.random() - 0.5) * 900);
    }
  }, PERFORM_GAP);

  // 效能：畫布在視口外或分頁切到背景 → 暫停模擬
  let inView = true;
  let visible = !document.hidden;
  const syncRun = () => { (inView && visible) ? sim.resume() : sim.pause(); };
  new IntersectionObserver((entries) => {
    inView = entries[0].isIntersecting;
    syncRun();
  }, { threshold: 0.05 }).observe(canvas);
  document.addEventListener('visibilitychange', () => {
    visible = !document.hidden;
    syncRun();
  });
}
</script>
</body>
</html>
