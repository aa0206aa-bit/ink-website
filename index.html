<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
/* ===== 設計 tokens（spec §5.1 墨夜畫廊）===== */
:root {
  --bg: #0d0d11;
  --panel: #16161c;
  --text: #f5f2ea;
  --text-dim: rgba(245, 242, 234, .55);
  --text-faint: rgba(245, 242, 234, .35);
  --gold: #d4af37;
  --gold-dim: rgba(212, 175, 55, .55);
  --serif: "Noto Serif TC", "Songti TC", Georgia, serif;
  --sans: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
  --maxw: 1080px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}
a { color: inherit; text-decoration: none; }
section { max-width: var(--maxw); margin: 0 auto; padding: 96px 24px; }
.section-title {
  font-family: var(--serif);
  font-size: 28px;
  letter-spacing: 8px;
  color: var(--text);
  margin-bottom: 12px;
}
.section-sub { color: var(--text-dim); font-size: 14px; margin-bottom: 48px; letter-spacing: 1px; }

/* ===== 導覽列 ===== */
.nav {
  position: sticky; top: 0; z-index: 100;
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 32px;
  background: rgba(13, 13, 17, .72);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255, 255, 255, .07);
}
.nav-brand { font-family: var(--serif); font-size: 18px; letter-spacing: 8px; }
.nav-links { display: flex; gap: 28px; font-size: 13px; letter-spacing: 3px; color: var(--text-dim); }
.nav-links a:hover { color: var(--gold); }
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-brand" href="#top">序序</a>
  <div class="nav-links">
